<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lumen Concierge — Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --a2ui-font-sans: "Inter", system-ui, -apple-system, sans-serif;
      --a2ui-font-serif: "Fraunces", "Times New Roman", serif;
      --a2ui-color-accent: #5B6CFF;
      --a2ui-radius-md: 12px;
      --bg: #faf7f1;
      --asst-border: #ece8e0;
      --text: #1B1B1F;
      --muted: #8a8790;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; background: var(--bg); font-family: var(--a2ui-font-sans); color: var(--text); }
    .stage { min-height: 100%; display: flex; align-items: stretch; justify-content: center; padding: 24px; }
    .device {
      width: 460px; height: 880px; max-height: calc(100vh - 48px);
      background: var(--bg);
      border-radius: 36px; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 30px 80px -30px rgba(20, 18, 14, 0.25), 0 4px 14px rgba(20, 18, 14, 0.08);
      border: 1px solid #e5e1d8;
    }
    .header { padding: 22px 20px 18px; text-align: center; background: #fff; border-bottom: 1px solid var(--asst-border); }
    .title { font-family: var(--a2ui-font-serif); font-weight: 600; font-size: 22px; line-height: 1.1; }
    .sub { font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: .2px; }
    .badge { display: inline-block; margin-top: 8px; font-size: 10px; padding: 4px 10px; border-radius: 999px; background: #f0eef9; color: #4a3aa0; letter-spacing: .4px; text-transform: uppercase; font-weight: 600; }
    .messages { flex: 1; overflow-y: auto; padding: 16px 12px 8px; display: flex; flex-direction: column; gap: 10px; }
    .row { display: flex; }
    .row.user { justify-content: flex-end; }
    .row.asst { justify-content: flex-start; }
    .bubble { max-width: 86%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.45; }
    .bubble.user { background: var(--a2ui-color-accent); color: #fff; border-bottom-right-radius: 6px; }
    .bubble.asst { background: #fff; color: var(--text); border: 1px solid var(--asst-border); border-bottom-left-radius: 6px; }
    .bubble.asst p { margin: 0; }
    .bubble.asst p + p { margin-top: 8px; }
    .bubble.asst strong { font-weight: 600; }
    .bubble.asst em { font-style: italic; }
    .bubble.asst code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; background: #f4efe6; padding: 1px 5px; border-radius: 4px; }
    .a2ui-slot { width: 100%; max-width: 100%; }
    .input { display: flex; padding: 10px 12px 16px; gap: 8px; align-items: center; background: var(--bg); border-top: 1px solid var(--asst-border); }
    .input input { flex: 1; padding: 12px 16px; border-radius: 999px; border: 1px solid var(--asst-border); font: inherit; font-size: 14px; background: #fff; color: var(--text); }
    .input input:focus { outline: none; border-color: var(--a2ui-color-accent); }
    .input button { width: 44px; height: 44px; border-radius: 50%; border: 0; background: var(--a2ui-color-accent); color: #fff; cursor: pointer; font-size: 18px; box-shadow: 0 4px 12px -4px rgba(91, 108, 255, 0.5); transition: transform .08s; display: flex; align-items: center; justify-content: center; }
    .input button:disabled { background: #c9c4d8; box-shadow: none; cursor: default; }
    .input button:active:not(:disabled) { transform: scale(0.95); }
    .welcome { padding: 24px 8px 8px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; }
    .welcome-mark { width: 44px; height: 44px; border-radius: 999px; background: var(--a2ui-color-accent); color: #fff; display: grid; place-items: center; font-family: var(--a2ui-font-serif); font-weight: 700; font-size: 20px; box-shadow: 0 6px 18px -8px rgba(91,108,255,0.6); margin-bottom: 4px; }
    .welcome-title { font-family: var(--a2ui-font-serif); font-weight: 600; font-size: 22px; line-height: 1.2; color: var(--text); }
    .welcome-sub { font-size: 13px; color: #6b6973; line-height: 1.5; max-width: 320px; }
    .prompts { display: flex; flex-direction: column; gap: 8px; padding: 18px 4px 0; width: 100%; }
    .prompt { text-align: left; font: inherit; font-size: 13.5px; color: var(--text); background: #fff; border: 1px solid var(--asst-border); border-radius: 14px; padding: 12px 14px; cursor: pointer; transition: transform .08s, border-color .15s, background .15s; }
    .prompt:hover { border-color: #d8d2c5; background: #fffdf8; }
    .prompt:active { transform: scale(0.98); }
    .thinking { display: inline-flex; gap: 5px; padding: 14px 16px; background: #fff; border: 1px solid var(--asst-border); border-radius: 18px; border-bottom-left-radius: 6px; }
    .thinking span { width: 6px; height: 6px; background: #c4c0c8; border-radius: 50%; animation: bounce 1.2s infinite ease-in-out; }
    .thinking span:nth-child(2) { animation-delay: .15s; }
    .thinking span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: .55; } 40% { transform: translateY(-4px); opacity: 1; } }
    .err { color: #b22; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="device">
      <div class="header">
        <div class="title">Lumen Concierge</div>
        <div class="sub">Personal shopping, thoughtfully picked</div>
        <div class="badge">Web · A2UI v0.8</div>
      </div>
      <div id="messages" class="messages"></div>
      <form id="form" class="input">
        <input id="input" placeholder="Tell the concierge…" autocomplete="off">
        <button type="submit" aria-label="Send">→</button>
      </form>
    </div>
  </div>
  <script type="module">
    // Lit components register themselves on import; the per-bubble
    // interpreter below mirrors the WebView shim (host-bundle/src/shim.js)
    // but renders into a chat row instead of a single #a2ui-root.
    import "./src/components/chip-group.js";
    import "./src/components/card-grid.js";
    import "./src/components/product-detail.js";
    import "./src/components/concierge-form.js";
    import "./src/components/confirmation-card.js";
    import "./src/components/payment-challenge.js";
    import "./src/components/tx-detail.js";

    const CATALOG_ID = "lumen.com:concierge/v1";
    const STANDARD_CATALOG_ID =
      "https://a2ui.org/specification/v0_8/standard_catalog_definition.json";

    const COMPONENT_TAG = {
      ChipGroup: "a2ui-chip-group",
      CardGrid: "a2ui-card-grid",
      ProductDetail: "a2ui-product-detail",
      ConciergeForm: "a2ui-form",
      ConfirmationCard: "a2ui-confirmation-card",
      PaymentChallenge: "a2ui-payment-challenge",
      TxDetail: "a2ui-tx-detail",
    };

    // ── v0.8 interpreter (web) ────────────────────────────────────────
    // Per-surface buffers shared across the chat — surfaceUpdate frames
    // can arrive incrementally; beginRendering for a known surface mounts
    // the root component into a fresh chat bubble.
    const surfaces = new Map();

    function ensureSurface(id) {
      let s = surfaces.get(id);
      if (!s) { s = { surfaceId: id, components: new Map(), dataModel: {} }; surfaces.set(id, s); }
      return s;
    }

    function ingest(msg) {
      if (msg == null) return;
      if (typeof msg === "string") { try { msg = JSON.parse(msg); } catch { return; } }
      if (Array.isArray(msg)) { msg.forEach(ingest); return; }
      if (msg.surfaceUpdate) onSurfaceUpdate(msg.surfaceUpdate);
      else if (msg.dataModelUpdate) onDataModelUpdate(msg.dataModelUpdate);
      else if (msg.beginRendering) onBeginRendering(msg.beginRendering);
      else if (msg.deleteSurface) onDeleteSurface(msg.deleteSurface);
    }

    function onSurfaceUpdate({ surfaceId, components }) {
      const s = ensureSurface(surfaceId);
      for (const c of components || []) if (c?.id) s.components.set(c.id, c);
    }

    function onDataModelUpdate({ surfaceId, path, contents }) {
      const s = ensureSurface(surfaceId);
      const entries = {};
      for (const e of contents || []) {
        if (!e || typeof e.key !== "string") continue;
        if ("valueString" in e) entries[e.key] = e.valueString;
        else if ("valueNumber" in e) entries[e.key] = e.valueNumber;
        else if ("valueBoolean" in e) entries[e.key] = e.valueBoolean;
        else if ("valueMap" in e) {
          entries[e.key] = {};
          for (const en of e.valueMap || []) {
            if ("valueString" in en) entries[e.key][en.key] = en.valueString;
            else if ("valueNumber" in en) entries[e.key][en.key] = en.valueNumber;
            else if ("valueBoolean" in en) entries[e.key][en.key] = en.valueBoolean;
          }
        }
      }
      if (!path || path === "/") s.dataModel = entries;
      else setByPath(s.dataModel, path, entries);
    }

    function onBeginRendering({ surfaceId, root, catalogId }) {
      const s = ensureSurface(surfaceId);
      if (catalogId && catalogId !== CATALOG_ID && catalogId !== STANDARD_CATALOG_ID) {
        console.warn("[a2ui] unsupported catalogId:", catalogId);
        return;
      }
      const def = s.components.get(root);
      if (!def) return;
      const el = instantiate(def, s);
      if (!el) return;
      mountSurfaceBubble(surfaceId, el);
    }

    function onDeleteSurface({ surfaceId }) {
      surfaces.delete(surfaceId);
      const row = document.querySelector(`[data-surface="${cssEscape(surfaceId)}"]`);
      if (row) row.remove();
    }

    function instantiate(def, surface) {
      const entry = Object.entries(def.component || {})[0];
      if (!entry) return null;
      const [type, rawProps] = entry;
      const tag = COMPONENT_TAG[type];
      if (!tag) return null;
      const el = document.createElement(tag);
      el._a2uiSurfaceId = surface.surfaceId;
      el._a2uiSourceComponentId = def.id;
      const resolved = resolveValue(rawProps, surface);
      if (resolved && typeof resolved === "object") {
        for (const [k, v] of Object.entries(resolved)) el[k] = v;
      }
      return el;
    }

    const BOUND_KEYS = new Set(["literalString", "literalNumber", "literalBoolean", "literalArray", "path"]);
    function isBoundValue(o) {
      const keys = Object.keys(o);
      return keys.length === 1 && BOUND_KEYS.has(keys[0]);
    }
    function resolveValue(v, surface) {
      if (v == null) return v;
      if (Array.isArray(v)) return v.map(x => resolveValue(x, surface));
      if (typeof v !== "object") return v;
      if (isBoundValue(v)) {
        if ("literalString" in v) return v.literalString;
        if ("literalNumber" in v) return v.literalNumber;
        if ("literalBoolean" in v) return v.literalBoolean;
        if ("literalArray" in v) return v.literalArray;
        if ("path" in v) return getByPath(surface.dataModel, v.path);
      }
      const out = {};
      for (const [k, sub] of Object.entries(v)) out[k] = resolveValue(sub, surface);
      return out;
    }
    function getByPath(model, path) {
      if (!path || path === "/") return model;
      const parts = path.replace(/^\/+/, "").split("/");
      let cur = model;
      for (const p of parts) { if (cur == null) return undefined; cur = cur[p]; }
      return cur;
    }
    function setByPath(model, path, value) {
      const parts = path.replace(/^\/+/, "").split("/").filter(Boolean);
      if (!parts.length) return;
      let cur = model;
      for (let i = 0; i < parts.length - 1; i++) {
        if (typeof cur[parts[i]] !== "object" || cur[parts[i]] == null) cur[parts[i]] = {};
        cur = cur[parts[i]];
      }
      cur[parts[parts.length - 1]] = value;
    }

    const cssEscape = (s) => (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/"/g, '\\"');

    function mountSurfaceBubble(surfaceId, el) {
      const row = document.createElement("div");
      row.className = "row asst";
      row.dataset.surface = surfaceId;
      const slot = document.createElement("div");
      slot.className = "a2ui-slot";
      slot.appendChild(el);
      row.appendChild(slot);
      appendStreamRow(row);
      scrollDown();
    }

    // ── client → server: userAction envelope translation ──────────────
    // Capture every component-level action, build a v0.8 userAction
    // envelope, then translate that envelope back into the legacy
    // `{component, ...context}` shape the agent's prompts still expect.
    document.addEventListener("a2ui-action", (e) => {
      const detail = e.detail || {};
      const name = detail.name;
      if (!name) return;
      const envelope = {
        userAction: {
          name,
          surfaceId: e.target?._a2uiSurfaceId ?? null,
          sourceComponentId: e.target?._a2uiSourceComponentId ?? null,
          timestamp: new Date().toISOString(),
          context: detail.context || {},
        },
      };
      handleUserAction(envelope);
    });

    function handleUserAction(envelope) {
      const action = envelope.userAction;
      if (!action) return;
      const name = action.name;
      const context = action.context || {};
      // Pure UI actions — don't echo a user bubble or send to the agent.
      if (name === "product-detail-close"
          || name === "payment-challenge-close"
          || name === "tx-detail-close") return;
      if (name === "tx-detail-open") {
        if (context.explorer_url) window.open(context.explorer_url, "_blank", "noreferrer");
        return;
      }
      const legacy = { component: name, ...context };
      const json = JSON.stringify(legacy);
      addUserBubble(humanize(legacy));
      send(`[ui-action] ${json}`);
    }

    const sessionId = `web-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const formEl = document.getElementById("form");

    const scrollDown = () => requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });

    const SAMPLE_PROMPTS = [
      "Help me find a housewarming gift",
      "Anniversary gift under $100",
      "Something thoughtful for my mom",
      "Gift for a coffee lover",
    ];

    function renderWelcome() {
      if (document.getElementById("welcome")) return;
      const wrap = document.createElement("div");
      wrap.id = "welcome";
      wrap.className = "welcome";
      wrap.innerHTML = `
        <div class="welcome-mark">L</div>
        <div class="welcome-title">Hi, I'm Lumen.</div>
        <div class="welcome-sub">Tell me who you're shopping for and I'll suggest a few thoughtful picks. Try one of these to get started:</div>
        <div class="prompts"></div>
      `;
      const promptsEl = wrap.querySelector(".prompts");
      for (const text of SAMPLE_PROMPTS) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "prompt";
        b.textContent = text;
        b.addEventListener("click", () => {
          if (sending) return;
          dismissWelcome();
          addUserBubble(text);
          send(text);
        });
        promptsEl.appendChild(b);
      }
      messagesEl.appendChild(wrap);
    }
    const dismissWelcome = () => document.getElementById("welcome")?.remove();

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function renderMarkdown(src) {
      const paras = escapeHtml(src).split(/\n{2,}/);
      return paras.map(p => {
        const html = p
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, "$1<em>$2</em>")
          .replace(/\n/g, "<br>");
        return `<p>${html}</p>`;
      }).join("");
    }

    function addUserBubble(text) {
      const row = document.createElement("div");
      row.className = "row user";
      const b = document.createElement("div");
      b.className = "bubble user";
      b.textContent = text;
      row.appendChild(b);
      messagesEl.appendChild(row);
      scrollDown();
    }

    function appendStreamRow(row) {
      const thinking = document.getElementById("thinking");
      if (thinking) messagesEl.insertBefore(row, thinking);
      else messagesEl.appendChild(row);
    }

    function startAsstBubble() {
      const row = document.createElement("div");
      row.className = "row asst";
      const b = document.createElement("div");
      b.className = "bubble asst";
      row.appendChild(b);
      appendStreamRow(row);
      scrollDown();
      return b;
    }

    function startThinking() {
      if (document.getElementById("thinking")) return;
      const row = document.createElement("div");
      row.className = "row asst";
      row.id = "thinking";
      const t = document.createElement("div");
      t.className = "thinking";
      t.innerHTML = "<span></span><span></span><span></span>";
      row.appendChild(t);
      messagesEl.appendChild(row);
      scrollDown();
    }
    const stopThinking = () => document.getElementById("thinking")?.remove();

    function humanize(o) {
      switch (o.component) {
        case "chip-group": return o.value ? o.value.charAt(0).toUpperCase() + o.value.slice(1) : "Selection";
        case "card-grid":  return o.name || "View item";
        case "product-detail": return `Add ${o.name || "item"} to order`;
        case "product-detail-followup": return `Tell me more about ${o.name || "this"}`;
        case "product-detail-visit": return `Visit ${o.vendor || "vendor"}`;
        case "form":       return "Place order";
        case "confirmation-card": return "Confirmed";
        case "payment-completed": return "Paid";
        default:           return "Selection";
      }
    }

    // Android-only bridge methods kept as stubs on the web so the
    // payment-challenge component's `if (window.AndroidBridge?.foo)`
    // guards fall through to the web fetch fallbacks.
    window.AndroidBridge = { log(msg) { console.log("[a2ui]", msg); } };

    let sending = false;
    async function send(userMessage) {
      if (sending) return;
      sending = true;
      startThinking();
      let asstBubble = null;
      let asstText = "";
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ sessionId, userMessage }),
        });
        if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`);
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        const SEP = /\r?\n\r?\n/;
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          let m;
          while ((m = SEP.exec(buffer))) {
            const block = buffer.slice(0, m.index);
            buffer = buffer.slice(m.index + m[0].length);
            let event = "message";
            let data = "";
            for (const line of block.split(/\r?\n/)) {
              if (line.startsWith("event: ")) event = line.slice(7).trim();
              else if (line.startsWith("data: ")) data += line.slice(6);
            }
            if (event === "text") {
              const { text } = JSON.parse(data);
              if (!asstBubble) asstBubble = startAsstBubble();
              asstText += text;
              asstBubble.innerHTML = renderMarkdown(asstText);
              scrollDown();
            } else if (event === "a2ui") {
              // Each SSE frame carries one v0.8 message (surfaceUpdate,
              // beginRendering, ...). beginRendering is the trigger that
              // creates a chat-row bubble; surfaceUpdate buffers state.
              ingest(JSON.parse(data));
              asstBubble = null;
              asstText = "";
            } else if (event === "end") {
              stopThinking();
              break;
            }
          }
        }
      } catch (e) {
        const row = document.createElement("div");
        row.className = "row asst";
        row.innerHTML = `<div class="bubble asst err">${e.message}</div>`;
        appendStreamRow(row);
      } finally {
        stopThinking();
        sending = false;
      }
    }

    formEl.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text || sending) return;
      inputEl.value = "";
      dismissWelcome();
      addUserBubble(text);
      send(text);
    });

    renderWelcome();
  </script>
</body>
</html>
